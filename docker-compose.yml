services:
  matching-service:
    build:
      context: .
      dockerfile: services/matching-service/Dockerfile
    image: mini-exchange-matching
    expose:
      - "8001"
    ports:
      - "8001:8001"

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    image: mini-exchange-gateway
    environment:
      MATCHING_SERVICE_URL: "http://matching-service:8001"
    expose:
      - "8000"
    ports:
      - "8000:8000"
    depends_on:
      - matching-service
